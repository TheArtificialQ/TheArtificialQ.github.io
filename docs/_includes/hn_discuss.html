{% if page.hn_id %}
  <div class="hn-discuss">
    <a href="https://news.ycombinator.com/item?id={{ page.hn_id }}" rel="noopener" target="_blank" class="hn-discuss__link">
      <svg class="hn-discuss__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="26" height="26" aria-hidden="true">
        <rect class="hn-discuss__icon-rect" width="100" height="100" fill="#ff6600"/>
        <text class="hn-discuss__icon-text" x="50" y="73" font-family="Arial, sans-serif" font-size="68" font-weight="bold" fill="white" text-anchor="middle">Y</text>
      </svg>
      Discuss on Hacker News
    </a>
  </div>

  <style>
    .hn-discuss {
      margin-top: 48px;
      padding-top: 32px;
      border-top: 1px solid #2b2b2b;
      text-align: center;
    }
    .hn-discuss__link {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 11px 22px;
      background-color: #222222;
      border: 1px solid #ff6600;
      border-radius: 5px;
      color: #ff6600 !important;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none !important;
      transition: background-color 0.15s, color 0.15s;
    }
    .hn-discuss__link:visited {
      color: #ff6600 !important;
    }
    .hn-discuss__link:hover {
      background-color: #ff6600 !important;
      color: #fff !important;
      text-decoration: none !important;
    }
    .hn-discuss__link:hover .hn-discuss__icon-rect {
      fill: #fff;
    }
    .hn-discuss__link:hover .hn-discuss__icon-text {
      fill: #ff6600;
    }
    .hn-discuss__icon {
      flex-shrink: 0;
      border-radius: 3px;
    }
  </style>
{% endif %}
